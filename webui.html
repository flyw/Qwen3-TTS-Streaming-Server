<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-TTS Streaming Test (Binary Mode)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 550px;
        }
        h2 { color: #2c3e50; margin-top: 0; }
        .server-config {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 1rem;
        }
        .server-config input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #dce4ec;
            border-radius: 6px;
            font-size: 14px;
        }
        .server-config button {
            background-color: #27ae60;
            padding: 8px 16px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .server-config button:hover { background-color: #219a52; }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #dce4ec;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 1rem;
            resize: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 1rem;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .status {
            font-size: 14px;
            color: #7f8c8d;
        }
        .stats {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
        }
        .indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e74c3c;
            margin-right: 5px;
        }
        .indicator.active { background: #2ecc71; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Qwen3-TTS Binary Stream</h2>
    
    <div class="server-config">
        <input type="text" id="serverUrl" placeholder="Server URL..." value="http://127.0.0.1:9000/tts/stream">
        <input type="text" id="clientId" placeholder="Client ID..." value="web-client-1">
        <button id="saveBtn">Save</button>
    </div>

    <div class="server-config" style="background: #f8f9fa; padding: 10px; border-radius: 8px;">
        <label for="languageSelect" style="font-size: 14px; color: #2c3e50;">Language:</label>
        <select id="languageSelect" style="padding: 5px; border-radius: 4px; border: 1px solid #dce4ec;">
            <option value="auto">auto</option>
            <option value="Chinese" selected>Chinese</option>
            <option value="English">English</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="Cantonese">Cantonese</option>
        </select>
        <span style="font-size: 12px; color: #7f8c8d; margin-left: 20px;">* Generation parameters (Temp/Penalty) are now managed server-side for stability.</span>
    </div>

    <textarea id="inputText" placeholder="Enter text to synthesize...">Welcome to Qwen3-TTS. This is a high-performance raw binary stream without Base64 overhead.</textarea>

    <div class="controls">
        <button id="playBtn">Play</button>
        <div class="status">
            <span id="indicator" class="indicator"></span>
            Status: <span id="statusText">Ready</span>
        </div>
    </div>

    <div class="stats" id="statsBoard">
        <div>First Byte Latency (TTFB): <span id="ttft">---</span>ms</div>
        <div>Chunks Received: <span id="chunkCount">0</span></div>
        <div>Buffered Chunks: <span id="bufferedCount">0</span></div>
        <div>Avg Interval: <span id="avgInterval">---</span>ms</div>
    </div>
</div>

<script>
    const STORAGE_KEY_URL = "qwen3_tts_server_url";
    const STORAGE_KEY_ID = "qwen3_tts_client_id";

    function loadSettings() {
        const savedUrl = localStorage.getItem(STORAGE_KEY_URL);
        if (savedUrl) document.getElementById('serverUrl').value = savedUrl;
        const savedId = localStorage.getItem(STORAGE_KEY_ID);
        if (savedId) document.getElementById('clientId').value = savedId;
    }
    
    function getServerUrl() { return document.getElementById('serverUrl').value.trim(); }
    function getClientId() { return document.getElementById('clientId').value.trim() || "default"; }

    const saveBtn = document.getElementById('saveBtn');
    const playBtn = document.getElementById('playBtn');
    const inputText = document.getElementById('inputText');
    const statusText = document.getElementById('statusText');
    const indicator = document.getElementById('indicator');
    
    const languageSelect = document.getElementById('languageSelect');

    const ttftEl = document.getElementById('ttft');
    const chunkCountEl = document.getElementById('chunkCount');
    const bufferedCountEl = document.getElementById('bufferedCount');
    const avgIntervalEl = document.getElementById('avgInterval');

    let audioCtx = null;
    let nextStartTime = 0;
    let startTime = 0;
    let chunkCount = 0;
    let lastChunkTime = 0;
    let totalInterval = 0;

    let chunkBuffer = [];
    let isPlaying = false;
    let isFinished = false;

    loadSettings();

    saveBtn.onclick = () => {
        localStorage.setItem(STORAGE_KEY_URL, getServerUrl());
        localStorage.setItem(STORAGE_KEY_ID, getClientId());
        statusText.innerText = "Saved!";
        setTimeout(() => { statusText.innerText = "Ready"; }, 1000);
    };

    async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        nextStartTime = audioCtx.currentTime;
    }

    function resetStats() {
        chunkCount = 0;
        totalInterval = 0;
        lastChunkTime = 0;
        ttftEl.innerText = "---";
        chunkCountEl.innerText = "0";
        bufferedCountEl.innerText = "0";
        avgIntervalEl.innerText = "---";
        chunkBuffer = [];
        isPlaying = false;
        isFinished = false;
    }

    playBtn.onclick = async () => {
        const text = inputText.value.trim();
        if (!text) return;

        const SERVER_URL = getServerUrl();
        try {
            statusText.innerText = "Initializing...";
            resetStats();
            await initAudio();

            startTime = performance.now();
            indicator.classList.add('active');
            statusText.innerText = "Receiving Binary Stream...";

            const response = await fetch(SERVER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    language: languageSelect.value,
                    client_id: getClientId()
                })
            });

            if (!response.ok) throw new Error("Server Error");

            const reader = response.body.getReader();
            
            while (true) {
                const { done, value } = await reader.read(); // value is Uint8Array (bytes)
                if (done) {
                    isFinished = true;
                    break;
                }
                
                if (value && value.length > 0) {
                    handleBinaryChunk(value);
                }
            }
        } catch (error) {
            console.error(error);
            statusText.innerText = "Error: " + error.message;
            indicator.classList.remove('active');
        }
    };

    function handleBinaryChunk(uint8Array) {
        const now = performance.now();
        chunkCount++;

        if (chunkCount === 1) {
            ttftEl.innerText = (now - startTime).toFixed(0);
            lastChunkTime = now;
        } else {
            totalInterval += (now - lastChunkTime);
            lastChunkTime = now;
            avgIntervalEl.innerText = (totalInterval / (chunkCount - 1)).toFixed(0);
        }
        chunkCountEl.innerText = chunkCount;

        // Binary PCM16 (Int16) to WebAudio Float32
        const int16Array = new Int16Array(uint8Array.buffer, uint8Array.byteOffset, uint8Array.byteLength / 2);
        const float32Array = new Float32Array(int16Array.length);
        for (let i = 0; i < int16Array.length; i++) {
            float32Array[i] = int16Array[i] / 32768.0;
        }

        chunkBuffer.push(float32Array);
        bufferedCountEl.innerText = chunkBuffer.length;
        if (!isPlaying) startPlayback();
    }

    async function startPlayback() {
        if (isPlaying) return;
        isPlaying = true;
        
        while (chunkBuffer.length > 0 || !isFinished) {
            if (chunkBuffer.length > 0) {
                const float32Data = chunkBuffer.shift();
                bufferedCountEl.innerText = chunkBuffer.length;
                
                const audioBuffer = audioCtx.createBuffer(1, float32Data.length, 24000);
                audioBuffer.getChannelData(0).set(float32Data);
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);

                const scheduledTime = Math.max(nextStartTime, audioCtx.currentTime);
                source.start(scheduledTime);
                nextStartTime = scheduledTime + audioBuffer.duration;
                
                statusText.innerText = `Playing Binary...`;
            } else {
                await new Promise(r => setTimeout(r, 20));
            }
        }
        
        statusText.innerText = "Complete";
        indicator.classList.remove('active');
        isPlaying = false;
    }
</script>

</body>
</html>
